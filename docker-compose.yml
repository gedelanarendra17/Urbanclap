version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: urbanclap
      POSTGRES_PASSWORD: urbanclap123
      POSTGRES_DB: urbanclap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://urbanclap:urbanclap123@postgres:5432/urbanclap
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data:
